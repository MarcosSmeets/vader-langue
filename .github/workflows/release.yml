# Build cross-platform + publica binários ao dar push numa tag `v*`.
# (Template: requer o repositório no GitHub. Não testado nesta máquina.)
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: vader-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: vader-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: vader-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: vader-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: empacota binário
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/vader"
          [ -f "$src.exe" ] && src="$src.exe"
          cp "$src" "${{ matrix.artifact }}"
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
