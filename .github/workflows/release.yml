# Cross-compiles and publishes binaries when a `v*` tag is pushed. These assets
# are what `install.sh` / `install.ps1` download from `releases/latest`.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: vader-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: vader-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: vader-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: vader-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: package binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/vader"
          [ -f "$src.exe" ] && src="$src.exe"
          cp "$src" "${{ matrix.artifact }}"
      - name: checksum
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  # After the binaries + checksums are published, regenerate the Homebrew formula
  # and winget manifests from those checksums and commit them back to main.
  bump-packaging:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: regenerate packaging from release checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver="${GITHUB_REF_NAME#v}"
          tmp="$(mktemp -d)"
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --dir "$tmp" --pattern '*.sha256'
          sum() { awk '{print $1}' "$tmp/$1.sha256"; }
          export SHA_LINUX="$(sum vader-linux-x86_64)"
          export SHA_MACOS_X64="$(sum vader-macos-x86_64)"
          export SHA_MACOS_ARM64="$(sum vader-macos-arm64)"
          export SHA_WIN="$(sum vader-windows-x86_64.exe)"
          sh packaging/bump.sh "$ver"
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packaging/homebrew/vader.rb packaging/winget/manifests
          if git diff --cached --quiet; then
            echo "no packaging changes"
          else
            git commit -m "chore(release): bump packaging to ${GITHUB_REF_NAME} [skip ci]"
            git push origin HEAD:main
          fi
