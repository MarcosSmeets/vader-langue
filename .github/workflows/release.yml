# Cross-compiles and publishes binaries when a `v*` tag is pushed. These assets
# are what `install.sh` / `install.ps1` download from `releases/latest`.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: vader-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: vader-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: vader-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: vader-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: package binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/vader"
          [ -f "$src.exe" ] && src="$src.exe"
          cp "$src" "${{ matrix.artifact }}"
      - name: checksum
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
